<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Tab</title>

  <!-- 预加载关键资源 -->
  <link rel="preload" href="fonts/material-symbols-rounded-v255-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="styles/main.css" as="style">

  <!-- 关键CSS -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/ui-foundation.css">
  <link rel="stylesheet" href="styles/home-refresh.css">
  <link rel="stylesheet" href="fonts/material-symbols-rounded.css">
  <link rel="stylesheet" href="styles/offline-icons.css">

  <!-- 内联关键样式防止闪烁 -->
  <style>
    /* 防止页面闪烁的基础样式 */
    body {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #333;
      min-height: 100vh;
    }

    /* 隐藏所有滚动条 */
    html, body {
      scrollbar-width: none !important; /* Firefox */
      -ms-overflow-style: none !important; /* IE/Edge */
      overflow-y: auto;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    *::-webkit-scrollbar {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }

    body.loaded {
      opacity: 1;
    }

    /* 加载指示器 */
    .loading-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 10000;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4285f4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 14px;
    }

    /* 确保在JavaScript加载失败时页面仍可见 */
    body.no-js {
      opacity: 1 !important;
    }

    body.no-js .loading-indicator {
      display: none !important;
    }
  </style>
</head>
<body class="theme-default no-js home-page">
  <!-- 加载指示器 -->
  <div class="loading-indicator" id="loading-indicator">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载...</div>
  </div>

  <div class="background-container">
    <div class="background-overlay"></div>
  </div>
  
  <div class="container">
    <header class="home-header">
      <div class="search-container">
        <div class="search-box">
          <div class="search-input-row">
            <div class="search-engine-selector">
              <span class="material-symbols-rounded search-engine-icon">language</span>
              <span class="material-symbols-rounded search-engine-selector-hint">expand_more</span>
            </div>
            <div class="search-input-container">
              <input type="text" id="search-input"  autocomplete="off" spellcheck="false">
            </div>
            <button class="search-button" type="button">
              <span class="material-symbols-rounded">search</span>
            </button>
          </div>
          <!-- 搜索结果将在这里显示 -->
        </div>
        <div class="search-engine-panel">
          <div class="search-engine-panel-list"></div>
        </div>
      </div>
    </header>
    
    <main id="categories-container" class="grid-view">
      <!-- Categories will be dynamically inserted here -->
    </main>

    <div class="floating-buttons" id="floating-buttons">
      <div class="floating-submenu-group" id="floating-submenu-group">
        <div class="floating-submenu" id="view-submenu" data-submenu="view" hidden>
          <button id="quick-view-grid-btn" class="floating-submenu-btn secondary-btn" type="button" title="网格视图">
            <span class="material-symbols-rounded">grid_view</span>
          </button>
          <button id="quick-view-list-btn" class="floating-submenu-btn secondary-btn" type="button" title="列表视图">
            <span class="material-symbols-rounded">view_list</span>
          </button>
        </div>
        <div class="floating-submenu" id="display-submenu" data-submenu="display" hidden>
          <button class="floating-submenu-btn secondary-btn" type="button" data-display-mode="standard" title="标准模式">
            <span class="material-symbols-rounded">web</span>
          </button>
          <button class="floating-submenu-btn secondary-btn" type="button" data-display-mode="focus" title="专注模式">
            <span class="material-symbols-rounded">filter_center_focus</span>
          </button>
          <button class="floating-submenu-btn secondary-btn" type="button" data-display-mode="wallpaper" title="壁纸模式">
            <span class="material-symbols-rounded">image</span>
          </button>
        </div>
        <div class="floating-submenu" id="shortcut-open-submenu" data-submenu="open-mode" hidden>
          <button class="floating-submenu-btn secondary-btn" type="button" data-shortcut-open-mode="current-tab" title="当前页打开">
            <span class="material-symbols-rounded">tab</span>
          </button>
          <button class="floating-submenu-btn secondary-btn" type="button" data-shortcut-open-mode="new-tab" title="新标签页打开">
            <span class="material-symbols-rounded">open_in_new</span>
          </button>
        </div>
      </div>
      <div class="floating-buttons-group collapsed" id="floating-buttons-group">
        <button id="settings-btn" class="view-btn secondary-btn" title="设置">
          <span class="material-symbols-rounded">settings</span>
        </button>
        <button id="view-menu-btn" class="view-btn secondary-btn" type="button" title="视图">
          <span class="material-symbols-rounded">grid_view</span>
        </button>
        <button id="display-menu-btn" class="view-btn secondary-btn" type="button" title="模式">
          <span class="material-symbols-rounded">image</span>
        </button>
        <button id="shortcut-open-menu-btn" class="view-btn secondary-btn" type="button" title="打开方式">
          <span class="material-symbols-rounded">open_in_new</span>
        </button>
        <button id="add-category-btn" class="add-btn secondary-btn" title="添加分类">
          <span class="material-symbols-rounded">add</span>
        </button>
      </div>
      <button id="menu-toggle-btn" class="menu-btn primary-btn" title="菜单">
        <span class="material-symbols-rounded">menu</span>
      </button>
    </div>
  </div>

  <!-- Modal Templates -->
  <div id="category-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="category-modal-title">添加分类</h2>
        <button class="close-modal">×</button>
      </div>
      <div class="modal-body">
        <form id="category-form">
          <input type="hidden" id="category-id">
          <div class="form-group">
            <label for="category-name">分类名称</label>
            <input type="text" id="category-name" required>
          </div>
          <div class="form-group">
            <label for="category-color">分类颜色</label>
            <input type="color" id="category-color" value="#4285f4">
          </div>
          <div class="form-actions">
            <button type="button" id="delete-category-btn" class="delete-btn">删除</button>
            <button type="submit" class="save-btn">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="shortcut-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="shortcut-modal-title">添加快捷方式</h2>
        <button class="close-modal">×</button>
      </div>
      <div class="modal-body">
        <form id="shortcut-form">
          <input type="hidden" id="shortcut-id">
          <input type="hidden" id="shortcut-category-id">
          <div class="form-group">
            <label for="shortcut-url">网址</label>
            <div class="url-input-container">
              <input type="url" id="shortcut-url" required placeholder="https://">
              <button type="button" id="fetch-url-info" title="获取网站信息">
                <span class="material-symbols-rounded">download</span>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="shortcut-name">名称</label>
            <input type="text" id="shortcut-name" required>
          </div>
          <div class="form-group">
            <label>图标设置</label>
            <div class="icon-options">
              <div class="icon-option">
                <input type="radio" id="icon-type-letter" name="icon-type" value="letter" checked>
                <label for="icon-type-letter">使用首字母</label>
              </div>
              <div class="icon-option">
                <input type="radio" id="icon-type-favicon" name="icon-type" value="favicon">
                <label for="icon-type-favicon">使用网站图标</label>
              </div>
              <div class="icon-option">
                <input type="radio" id="icon-type-custom" name="icon-type" value="custom">
                <label for="icon-type-custom">自定义图标</label>
              </div>
            </div>
          </div>
          <div id="favicon-preview" class="form-group hidden">
            <label>网站图标预览</label>
            <div class="favicon-container">
              <img id="favicon-image" src="" alt="网站图标">
              <p class="note">自动从网站获取的图标</p>
            </div>
          </div>
          <div id="custom-icon-form" class="form-group hidden">
            <label for="shortcut-icon-url">图标URL</label>
            <input type="url" id="shortcut-icon-url" placeholder="https://example.com/icon.png">
          </div>
          <div id="letter-icon-form" class="form-group">
            <label for="shortcut-color">图标背景色</label>
            <input type="color" id="shortcut-color" value="#4285f4">
          </div>
          <div class="form-actions">
            <button type="button" id="delete-shortcut-btn" class="delete-btn">删除</button>
            <button type="submit" class="save-btn">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>


  <!-- 优先加载性能优化脚本 -->
  <script src="js/ui/simple-loading-manager.js"></script>

  <!-- 核心功能脚本 -->
  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/core/supabase-client.js"></script>
  <script src="js/core/cf-client.js"></script>
  <script src="js/core/sync-provider.js"></script>

  <!-- 新的统一数据管理系统 -->
  <script src="js/core/unified-data-manager.js"></script>
  <script src="js/core/storage-adapter.js"></script>
  <script src="js/core/sync-adapter.js"></script>

  <!-- UI管理器 -->
  <script src="js/ui/notification.js"></script>
  <script src="js/ui/favicon-helper.js"></script>

  <!-- 业务逻辑模块 -->
  <script src="js/features/category.js"></script>
  <script src="js/features/shortcut.js"></script>
  <script src="js/features/search-engine-registry.js"></script>
  <script src="js/features/search.js"></script>
  <script src="js/ui/view.js"></script>
  <script src="js/ui/theme.js"></script>

  <!-- 功能增强模块 -->
  <script src="js/ui/icons.js"></script>
  <script src="js/features/offline-manager.js"></script>
  <script src="js/features/drag-manager.js"></script>

  <!-- 主初始化脚本最后加载 -->
  <script src="js/main.js"></script>
</body>
</html>
